<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>개발자의 뻘짓</title>
    <link id="iconLink" rel="icon" type="image/gif" href="icon.gif" />

    <script>
      let iconLink = document.querySelector("#iconLink")
      let favicon_images = [
        'icon0.png',
        'icon1.png',
      ]
      let image_counter = 1; // To keep track of the current image

      setInterval(function() {
        iconLink.href = favicon_images[image_counter]

        if(image_counter == favicon_images.length -1){
          image_counter = 0;
        }
        else {
          image_counter++;
        }
      }, 1000);
    </script>
    
    <!-- 디스코드 임베드 -->
    <meta content="개발자의 뻘짓" property="og:title" />
